<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISEKAI GUILD: 理不尽クエスト掲示板</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 名前入力モーダル -->
    <div id="name-modal" class="modal-overlay">
        <div class="modal-box">
            <h2>冒険者登録</h2>
            <p>ギルドに登録する冒険者名を入力してください。</p>
            <p class="modal-note">※このセッション限りの登録です。ページを閉じると記録は消えます。</p>
            <input type="text" id="player-name-input" placeholder="例：勇者ポチ" maxlength="20">
            <button id="start-game-btn">ギルドに登録する</button>
        </div>
    </div>

    <!-- ゲームオーバーモーダル -->
    <div id="gameover-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <h2>力尽きました…</h2>
            <p id="gameover-message"></p>
            <div class="final-rank" id="final-rank-display"></div>
            <button id="restart-btn">最初からやり直す</button>
        </div>
    </div>

    <div class="guild-container">
        <header class="guild-header">
            <h1>ISEKAI GUILD: 理不尽クエスト掲示板</h1>
        </header>

        <!-- ステータスバー -->
        <div class="status-bar">
            <div class="status-item">
                <span class="status-label">冒険者:</span>
                <span id="player-name-display">-</span>
            </div>
            <div class="status-item hp-status">
                <span class="status-label">体力:</span>
                <div class="hp-bar-container">
                    <div id="hp-bar-fill" class="hp-bar-fill"></div>
                </div>
                <span id="hp-text">100 / 100</span>
            </div>
            <div class="status-item">
                <span class="status-label">ギルドランク:</span>
                <span id="rank-display" class="rank-badge">F（荷物持ち）</span>
            </div>
        </div>

        <div class="guild-content">
            <aside class="guild-sidebar">
                <div class="sidebar-box">
                    <p class="powered-by">Powered by Groq API</p>
                    <h2>理不尽クエスト<br>生成器</h2>
                    <button id="generate-btn">GENERATE UNREASONABLE QUEST</button>
                    <p class="sidebar-note">...冒険者よ、命を賭してクソ業務に挑め。<br>体力が尽きるまで、ランクを上げ続けろ。</p>
                </div>
            </aside>

            <main class="guild-board">
                <div class="board-title">QUEST BOARD</div>
                <div id="quest-list" class="quest-list">
                    <p id="empty-board-message" class="empty-board-message">
                        まだ依頼が貼られていません。「GENERATE」ボタンでクエストを発見しよう。
                    </p>
                </div>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
