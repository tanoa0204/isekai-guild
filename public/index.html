<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISEKAI GUILD: 理不尽クエスト掲示板</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="guild-container">
        <header class="guild-header">
            <h1>ISEKAI GUILD: 理不尽クエスト掲示板</h1>
        </header>

        <div class="guild-content">
            <aside class="guild-sidebar">
                <div class="sidebar-box">
                    <p class="powered-by">Powered by Groq API</p>
                    <h2>理不尽クエスト<br>生成器</h2>
                    <button id="generate-btn">GENERATE UNREASONABLE QUEST</button>
                    <p class="sidebar-note">...冒険者よ、命を賭してクソ業務に挑め。</p>
                </div>
            </aside>

            <main class="guild-board">
                <div class="board-title">QUEST BOARD</div>
                <div id="quest-list" class="quest-list">
                    <div class="quest-card">
                        <div class="quest-tag">【高難度】</div>
                        <h3 class="quest-title">魔王城のWi-Fiルーター再起動</h3>
                        <p class="quest-details"><strong>詳細:</strong> 魔王軍の電波状況が悪いため、玉座の裏にあるルーターをコンセントから抜いて10秒待ってから挿し直してください。なお、魔王は現在在宅です。</p>
                        <p class="quest-reward"><strong>報酬:</strong> 10ゴールド（ただし事務手数料として12ゴールド引かれます）</p>
                        <button class="order-btn">受注する（血の契約）</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
